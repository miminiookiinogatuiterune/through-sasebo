  nagasaki:  ['nagasaki', 'toyokeizai', 'mesitsu', 'tap'],

  island:    ['island'],

function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function distLabel(km) {
  if (km < 1) return Math.round(km*1000)+'m';
  if (km < 100) return km.toFixed(1)+'km';
  return Math.round(km)+'km';
}

function makeCard(a, dist) {
  const distHtml = dist !== null ? `<span class="article-dist">📍 ${distLabel(dist)}</span>` : '';
  return `
    <a class="article" href="${a.href}" target="_blank" rel="noopener">
      <div class="article-meta">
        <div class="article-top">
          <span class="article-source">${a.source}</span>
          <span class="article-date">${a.date}</span>
          ${distHtml}
        </div>
        <div class="article-title">${a.title}</div>
        ${a.desc ? `<div class="article-desc">${a.desc}</div>` : ''}
      </div>
      <span class="ext-icon">↗</span>
    </a>`;
}

let userLat = null, userLng = null;

function renderAll() {
  for (const [panel, keys] of Object.entries(tabMap)) {
    const list = keys.flatMap(k => articles[k] || []);
    document.getElementById('panel-'+panel).innerHTML = list.map(a => makeCard(a, null)).join('');
  }
  renderWork();
  renderNear();
}

function renderNear() {
  const all = Object.values(articles).flat();
  let sorted;
  if (userLat !== null) {
    sorted = all.map(a => ({...a, dist: calcDist(userLat, userLng, a.lat, a.lng)})).sort((a,b) => a.dist-b.dist);
  } else {
    sorted = all;
  }
  document.getElementById('panel-near').innerHTML = sorted.map(a =>
    makeCard(a, userLat !== null ? a.dist : null)
  ).join('');
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelector('.list').scrollTop = 0;
}

function tryGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    renderNear();
    const all = Object.values(articles).flat()
      .map(a => ({...a, dist: calcDist(userLat, userLng, a.lat, a.lng)}))
      .sort((a,b) => a.dist-b.dist);
    const nearest = all[0];
    const banner = document.getElementById('geo-banner');
    banner.textContent = `📍 現在地から最も近い記事：「${nearest.title.slice(0,22)}…」（${distLabel(nearest.dist)}）`;
    banner.classList.add('show');
  }, () => {
    document.querySelector('.tab:first-child').style.display = 'none';
    document.querySelector('.tab:nth-child(2)').click();
  });
}

function startMain() {
  document.getElementById('screen-title').classList.add('exit');
  document.getElementById('screen-main').classList.add('enter');
  renderAll();
  tryGeo();
}
