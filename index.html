const tabMap = {

  interview: ['interview', 'kujiranohige'],
  island: ['island'],
  daily: ['daily'],
};

// 既存の距離計算・ラベル関数を維持
function calcDist(lat1, lng1, lat2, lng2) { const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLng = (lng2 - lng1) * Math.PI / 180; const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
function distLabel(km) { if (km < 1) return Math.round(km*1000)+'m'; if (km < 100) return km.toFixed(1)+'km'; return Math.round(km)+'km'; }

function makeCard(a, dist) {
  const distHtml = dist !== null ? `<span class="article-dist">📍 ${distLabel(dist)}</span>` : '';
  const bookHtml = a.book === 1 ? `<span class="book-badge book-badge-1">自由研究①</span>` : a.book === 2 ? `<span class="book-badge book-badge-2">自由研究②</span>` : '';
  return `<a class="article" href="${a.href}" target="_blank" rel="noopener"><div class="article-meta"><div class="article-top"><span class="article-source">${a.source}</span><span class="article-date">${a.date}</span>${bookHtml}${distHtml}</div><div class="article-title">${a.title}</div>${a.desc ? `<div class="article-desc">${a.desc}</div>` : ''}</div><span class="ext-icon">↗</span></a>`;
}

let userLat = null, userLng = null;

// ソート関数（文字列比較で日付順にする）
function sortByDate(list) {
  return [...list].sort((a, b) => {
    const da = a.date ? a.date.replace(/\//g, '-') : '0000-00-00';
    const db = b.date ? b.date.replace(/\//g, '-') : '0000-00-00';
    return db.localeCompare(da);
  });
}

function renderAll() {
  // 各パネルの描画
  for (const [panel, keys] of Object.entries(tabMap)) {
    const list = sortByDate(keys.flatMap(k => articles[k] || []));
    document.getElementById('panel-'+panel).innerHTML = list.map(a => makeCard(a, null)).join('');
  }
  
  // 「新着順」パネルの描画（全記事をマージしてソート）
  const all = Object.values(articles).flat();
  document.getElementById('panel-new').innerHTML = sortByDate(all).map(a => makeCard(a, null)).join('');

  renderWork();
  renderNear();
}

function renderNear() {
  const all = Object.values(articles).flat();
  let sorted = userLat !== null ? all.map(a => ({...a, dist: calcDist(userLat, userLng, a.lat, a.lng)})).sort((a,b) => a.dist-b.dist) : all;
  document.getElementById('panel-near').innerHTML = sorted.map(a => makeCard(a, userLat !== null ? a.dist : null)).join('');
}

function renderWork() {
  document.getElementById('panel-work').innerHTML = `<div class="work-section"><div class="work-section-title">この人に書いてほしい</div><div class="work-section-body">1986年生まれ、長崎県佐世保市在住のフリーライター。地元の文化・歴史・老舗・人物などの取材撮影執筆。</div><a href="mailto:your@email.com?subject=取材のご依頼" class="cta-btn">取材を依頼する</a></div>`;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function tryGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
    renderNear();
    const all = Object.values(articles).flat().map(a => ({...a, dist: calcDist(userLat, userLng, a.lat, a.lng)})).sort((a,b) => a.dist-b.dist);
    const nearest = all[0];
    const banner = document.getElementById('geo-banner');
    banner.textContent = `📍 現在地から最も近い記事：「${nearest.title.slice(0,20)}…」（${distLabel(nearest.dist)}）`;
    banner.classList.add('show');
  });
}

function startMain() {
  document.getElementById('screen-title').classList.add('exit');
  document.getElementById('screen-main').classList.add('enter');
  renderAll();
  tryGeo();
}
</script>
